services:
  # --- APP QUART (PYTHON 3.14) ---
  app_aps:
    build: .
    container_name: APS_CONTAINER
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES}
    depends_on:
      - db_aps
    networks:
      - aps_network

  # --- BASE DE DATOS (POSTGRES 16) ---
  db_aps:
    image: postgres:16-alpine
    container_name: APS_DB_CONTAINER
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      # Ruta física en el VPS : Ruta interna del contenedor
      - /home/osantonio/proyectos/aps/database/data:/var/lib/postgresql/data
    ports:
      - "5432:5432"          # Abierto para tu pgAdmin de Windows
    networks:
      - aps_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  aps_network:
    driver: bridge
