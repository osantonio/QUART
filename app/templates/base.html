<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Mi sitio{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
  <script src="{{ url_for('static', filename='js/theme.js') }}" defer></script>
  <script src="{{ url_for('static', filename='js/navbar.js') }}" defer></script>
  <script src="{{ url_for('static', filename='js/sidebar.js') }}" defer></script>
  <script src="{{ url_for('static', filename='js/notifications.js') }}" defer></script>
</head>

<body class="min-h-screen flex flex-col">
  {% include "components/navbar.html" %}
  <main class="flex-1">
    <div class="max-w-6xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8 flex gap-6">
      {% include "components/sidebar.html" %}
      <div class="flex-1">
        {% include "components/flash_messages.html" %}
        {% block content %}{% endblock %}
      </div>
    </div>
  </main>
  {% include "components/footer.html" %}
</body>

</html>
