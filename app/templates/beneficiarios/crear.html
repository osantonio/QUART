{% extends "base.html" %}

{% block title %}{{ 'Editar' if beneficiario else 'Nuevo' }} Beneficiario{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto space-y-6">
    <div class="flex items-center gap-4">
        <a href="{{ url_for('beneficiarios.listar') }}" class="link-muted">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path d="M15 19l-7-7 7-7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
        </a>
        <h1 class="text-2xl font-bold text-foreground">
            {{ 'Editar Perfil de' if beneficiario else 'Registrar Nuevo' }} Beneficiario
        </h1>
    </div>

    <form method="POST" class="space-y-8">
        <!-- Sección: Datos Personales -->
        <div class="bg-card border border-border/40 rounded-sm p-6 space-y-4">
            <h2
                class="text-sm font-bold uppercase tracking-widest text-accent-foreground/80 border-b border-border/40 pb-2">
                Información Personal</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-2">
                    <label class="text-xs font-medium text-muted-foreground">Nombres *</label>
                    <input type="text" name="nombres" value="{{ beneficiario.nombres if beneficiario else '' }}"
                        required
                        class="w-full bg-secondary/30 border-border/40 rounded p-2 text-sm focus:ring-1 focus:ring-link outline-none">
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-medium text-muted-foreground">Apellidos *</label>
                    <input type="text" name="apellidos" value="{{ beneficiario.apellidos if beneficiario else '' }}"
                        required
                        class="w-full bg-secondary/30 border-border/40 rounded p-2 text-sm focus:ring-1 focus:ring-primary outline-none">
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-medium text-muted-foreground">Identificación *</label>
                    <input type="text" name="identificacion"
                        value="{{ beneficiario.identificacion if beneficiario else '' }}" required
                        class="w-full bg-secondary/30 border-border/40 rounded p-2 text-sm focus:ring-1 focus:ring-primary outline-none">
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-medium text-muted-foreground">Fecha de Nacimiento *</label>
                    <input type="date" name="fecha_nacimiento"
                        value="{{ beneficiario.fecha_nacimiento if beneficiario else '' }}" required
                        class="w-full bg-secondary/30 border-border/40 rounded p-2 text-sm focus:ring-1 focus:ring-primary outline-none">
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-medium text-muted-foreground">Género</label>
                    <select name="genero"
                        class="w-full bg-secondary/30 border-border/40 rounded p-2 text-sm outline-none">
                        <option value="M" {{ 'selected' if beneficiario and beneficiario.genero=='M' else '' }}>
                            Masculino</option>
                        <option value="F" {{ 'selected' if beneficiario and beneficiario.genero=='F' else '' }}>Femenino
                        </option>
                        <option value="Otro" {{ 'selected' if beneficiario and beneficiario.genero=='Otro' else '' }}>
                            Otro</option>
                    </select>
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-medium text-muted-foreground">Religión</label>
                    <input type="text" name="religion" value="{{ beneficiario.religion if beneficiario else '' }}"
                        class="w-full bg-secondary/30 border-border/40 rounded p-2 text-sm outline-none">
                </div>
            </div>
        </div>

        <!-- Sección: Datos Médicos -->
        <div class="bg-card border border-border/40 rounded-sm p-6 space-y-4">
            <h2
                class="text-sm font-bold uppercase tracking-widest text-accent-foreground/80 border-b border-border/40 pb-2">
                Información Médica Boda</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="space-y-2">
                    <label class="text-xs font-medium text-muted-foreground">Tipo de Sangre</label>
                    <select name="tipo_sangre"
                        class="w-full bg-secondary/30 border-border/40 rounded p-2 text-sm outline-none">
                        {% for ts in ['O+', 'O-', 'A+', 'A-', 'B+', 'B-', 'AB+', 'AB-'] %}
                        <option value="{{ ts }}" {{ 'selected' if beneficiario and beneficiario.tipo_sangre==ts else ''
                            }}>{{ ts }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-medium text-muted-foreground">EPS</label>
                    <input type="text" name="eps" value="{{ beneficiario.eps if beneficiario else '' }}"
                        class="w-full bg-secondary/30 border-border/40 rounded p-2 text-sm outline-none">
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-medium text-muted-foreground">Estatura (cm)</label>
                    <input type="number" step="0.1" name="estatura"
                        value="{{ beneficiario.estatura if beneficiario else '' }}"
                        class="w-full bg-secondary/30 border-border/40 rounded p-2 text-sm outline-none">
                </div>
            </div>
        </div>

        <!-- Sección: Administrativo -->
        <div class="bg-card border border-border/40 rounded-sm p-6 space-y-4">
            <h2
                class="text-sm font-bold uppercase tracking-widest text-accent-foreground/80 border-b border-border/40 pb-2">
                Administrativo</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-2">
                    <label class="text-xs font-medium text-muted-foreground">Número de Habitación</label>
                    <input type="text" name="numero_habitacion"
                        value="{{ beneficiario.numero_habitacion if beneficiario else '' }}"
                        class="w-full bg-secondary/30 border-border/40 rounded p-2 text-sm outline-none">
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-medium text-muted-foreground">Fecha de Ingreso</label>
                    <input type="date" name="fecha_ingreso"
                        value="{{ beneficiario.fecha_ingreso if beneficiario else '' }}"
                        class="w-full bg-secondary/30 border-border/40 rounded p-2 text-sm outline-none">
                </div>
                <div class="md:col-span-2 space-y-2">
                    <label class="text-xs font-medium text-muted-foreground">Observaciones</label>
                    <textarea name="observaciones" rows="3"
                        class="w-full bg-secondary/30 border-border/40 rounded p-2 text-sm outline-none">{{ beneficiario.observaciones if beneficiario else '' }}</textarea>
                </div>
            </div>
        </div>

        <div class="flex justify-end gap-3">
            <a href="{{ url_for('beneficiarios.listar') }}"
                class="px-6 py-2 rounded text-sm font-medium border border-border/40 hover:bg-secondary/20 transition-colors">Cancelar</a>
            <button type="submit" class="btn-primary px-8 py-2 rounded text-sm font-bold uppercase tracking-widest">
                {{ 'Guardar Cambios' if beneficiario else 'Registrar Beneficiario' }}
            </button>
        </div>
    </form>
</div>
{% endblock %}
