{% extends "base.html" %}

{% block title %}Crear Visitante{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto space-y-6">
    <div class="flex items-center gap-4">
        <a href="{{ back_url }}"
            class="text-muted-foreground hover:text-foreground">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path d="M15 19l-7-7 7-7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
        </a>
        <h1 class="text-2xl font-bold text-foreground">Crear Visitante</h1>
    </div>

    <div class="bg-card border border-border/40 rounded-sm p-6">
        <form method="POST" class="space-y-6">
            {% if beneficiario_id %}
            <input type="hidden" name="beneficiario_id" value="{{ beneficiario_id }}">
            {% endif %}
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-2">
                    <label class="text-xs font-bold uppercase tracking-widest text-muted-foreground">Nombres *</label>
                    <input type="text" name="nombres" required
                        class="w-full bg-secondary/30 border-border/40 rounded p-3 text-sm outline-none focus:ring-1 focus:ring-primary">
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-bold uppercase tracking-widest text-muted-foreground">Apellidos *</label>
                    <input type="text" name="apellidos" required
                        class="w-full bg-secondary/30 border-border/40 rounded p-3 text-sm outline-none focus:ring-1 focus:ring-primary">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-2">
                    <label class="text-xs font-bold uppercase tracking-widest text-muted-foreground">Teléfono *</label>
                    <input type="text" name="telefono" required
                        class="w-full bg-secondary/30 border-border/40 rounded p-3 text-sm outline-none">
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-bold uppercase tracking-widest text-muted-foreground">Dirección</label>
                    <input type="text" name="direccion"
                        class="w-full bg-secondary/30 border-border/40 rounded p-3 text-sm outline-none">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-2">
                    <label class="text-xs font-bold uppercase tracking-widest text-muted-foreground">Género *</label>
                    <select name="genero" required
                            class="w-full bg-secondary/30 border-border/40 rounded p-3 text-sm outline-none">
                        <option value="" disabled selected>Seleccione...</option>
                        <option value="M">Masculino</option>
                        <option value="F">Femenino</option>
                        <option value="Otro">Otro</option>
                    </select>
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-bold uppercase tracking-widest text-muted-foreground">Fecha de nacimiento</label>
                    <input type="date" name="fecha_nacimiento"
                           class="w-full bg-secondary/30 border-border/40 rounded p-3 text-sm outline-none">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-xs font-bold uppercase tracking-widest text-muted-foreground">Email</label>
                <input type="email" name="email"
                    class="w-full bg-secondary/30 border-border/40 rounded p-3 text-sm outline-none">
            </div>

            

            <div class="pt-4 flex justify-end gap-3">
                <a href="{{ back_url }}"
                    class="px-6 py-3 rounded text-sm font-medium border border-border/40 hover:bg-secondary/20 transition-colors">Cancelar</a>
                <button type="submit"
                    class="px-8 py-3 rounded text-sm font-bold uppercase tracking-widest bg-primary text-primary-foreground hover:opacity-90">Crear</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
