{% extends "base.html" %}

{% block title %}Cambiar Contraseña - {{ usuario.username }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto space-y-6">
    <!-- Header -->
    <div class="flex items-center justify-between">
        <div>
            <h1 class="text-2xl font-bold text-foreground">Cambiar Contraseña</h1>
            <p class="text-sm text-muted-foreground">Mantén tu cuenta segura actualizando tu contraseña periódicamente.
            </p>
        </div>
        <a href="{{ url_for('me.perfil') }}"
            class="inline-flex items-center gap-2 px-4 py-2 rounded-sm border border-border bg-secondary text-secondary-foreground hover:bg-accent hover:text-accent-foreground transition-colors text-sm font-medium">
            Cancelar
        </a>
    </div>

    <!-- Formulario -->
    <div class="bg-card text-card-foreground border border-border rounded-sm shadow-lg overflow-hidden">
        <form method="post" class="divide-y divide-border">
            <div class="p-6 space-y-4">
                <div class="space-y-2">
                    <label for="current_password" class="text-sm font-medium text-foreground">
                        Contraseña Actual
                    </label>
                    <input id="current_password" name="current_password" type="password" required
                        class="w-full rounded-sm border border-input bg-background px-4 py-3 text-sm outline-none transition-colors focus:border-ring focus:ring-2 focus:ring-ring/20"
                        placeholder="••••••••">
                </div>

                <div class="space-y-4 pt-4 border-t border-border">
                    <div class="space-y-2">
                        <label for="new_password" class="text-sm font-medium text-foreground">
                            Nueva Contraseña
                        </label>
                        <input id="new_password" name="new_password" type="password" required
                            class="w-full rounded-sm border border-input bg-background px-4 py-3 text-sm outline-none transition-colors focus:border-ring focus:ring-2 focus:ring-ring/20"
                            placeholder="Mínimo 6 caracteres">
                    </div>
                    <div class="space-y-2">
                        <label for="confirm_password" class="text-sm font-medium text-foreground">
                            Confirmar Nueva Contraseña
                        </label>
                        <input id="confirm_password" name="confirm_password" type="password" required
                            class="w-full rounded-sm border border-input bg-background px-4 py-3 text-sm outline-none transition-colors focus:border-ring focus:ring-2 focus:ring-ring/20"
                            placeholder="Repite la nueva contraseña">
                    </div>
                </div>
            </div>

            <!-- Footer con acciones -->
            <div class="p-6 bg-secondary/10 flex items-center justify-end gap-3">
                <a href="{{ url_for('me.perfil') }}"
                    class="px-4 py-2 text-sm font-medium text-muted-foreground hover:text-foreground transition-colors">
                    Descartar
                </a>
                <button type="submit"
                    class="rounded-sm bg-primary px-6 py-2.5 text-sm font-medium text-primary-foreground shadow-sm transition-all hover:bg-primary/90 hover:shadow-md focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-2">
                    Actualizar Contraseña
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
