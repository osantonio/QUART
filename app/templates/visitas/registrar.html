{% extends "base.html" %}

{% block title %}Registrar Visita{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto space-y-6">
    <div class="flex items-center gap-4">
        <a href="{{ back_url }}"
            class="text-muted-foreground hover:text-foreground">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path d="M15 19l-7-7 7-7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
        </a>
        <h1 class="text-2xl font-bold text-foreground">Registro de Visita</h1>
    </div>

    <div class="bg-card border border-border/40 rounded-sm p-6">
        <form method="POST" class="space-y-6">
            <div class="space-y-2">
                <label class="text-xs font-bold uppercase tracking-widest text-muted-foreground">Visitante Autorizado
                    *</label>
                <select name="visitante_id" required
                    class="w-full bg-secondary/30 border-border/40 rounded p-3 text-sm outline-none">
                    <option value="" disabled selected>Seleccione un visitante registrado...</option>
                    {% for v in visitantes %}
                    <option value="{{ v.id }}">{{ v.nombres }} {{ v.apellidos }}</option>
                    {% endfor %}
                </select>
                {% if not visitantes %}
                <p class="text-[10px] text-amber-500 font-medium">No hay visitantes registrados para este beneficiario.
                    <a href="{{ url_for('visitantes.crear', beneficiario_id=beneficiario_id) }}"
                        class="underline">Crear uno primero</a></p>
                {% endif %}
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-2">
                    <label class="text-xs font-bold uppercase tracking-widest text-muted-foreground">Fecha *</label>
                    <input type="date" name="fecha_visita" value="{{ hoy }}" required
                        class="w-full bg-secondary/30 border-border/40 rounded p-3 text-sm outline-none">
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-bold uppercase tracking-widest text-muted-foreground">Hora de Entrada
                        *</label>
                    <input type="time" name="hora_entrada" required
                        class="w-full bg-secondary/30 border-border/40 rounded p-3 text-sm outline-none">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-xs font-bold uppercase tracking-widest text-muted-foreground">Observaciones</label>
                <textarea name="observaciones" rows="3"
                    class="w-full bg-secondary/30 border-border/40 rounded p-3 text-sm outline-none"
                    placeholder="Opcional..."></textarea>
            </div>

            <div class="pt-4 flex justify-end gap-3">
                <a href="{{ back_url }}"
                    class="px-6 py-3 rounded text-sm font-medium border border-border/40 hover:bg-secondary/20 transition-colors">Cancelar</a>
                <button type="submit"
                    class="px-8 py-3 rounded text-sm font-bold uppercase tracking-widest bg-primary text-primary-foreground hover:opacity-90 transition-opacity"
                    {{ 'disabled' if not visitantes else '' }}>
                    Registrar Entrada
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
